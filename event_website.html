<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Event</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
}

header {
    background-color: #333;
    color: #fff;
    padding: 1em 0;
    text-align: center;
}

main {
    padding: 20px;
    max-width: 900px;
    margin: 20px auto;
    background-color: #fff;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.schedule-item {
    background-color: #e9e9e9;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.schedule-item:hover {
    background-color: #dcdcdc;
}

.schedule-item.break {
    background-color: #f0f0f0;
    cursor: default;
}

.schedule-item.break:hover {
    background-color: #f0f0f0;
}

.schedule-item h3 {
    margin-top: 0;
    color: #0056b3;
}

.schedule-item p {
    margin: 5px 0;
}

.search-bar {
    display: flex;
    margin-bottom: 20px;
}

.search-bar input {
    flex-grow: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-right: 10px;
}

.search-bar button {
    padding: 10px 15px;
    background-color: #0056b3;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.search-bar button:hover {
    background-color: #004085;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.4);
    padding-top: 60px;
}

.modal-content {
    background-color: #fefefe;
    margin: 5% auto;
    padding: 20px;
    border: 1px solid #888;
    width: 80%;
    max-width: 600px;
    border-radius: 8px;
    position: relative;
}

.close-button {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    position: absolute;
    right: 10px;
    top: 5px;
    cursor: pointer;
}

.close-button:hover,
.close-button:focus {
    color: black;
    text-decoration: none;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    background-color: #333;
    color: #fff;
    margin-top: 20px;
}
</style>
</head>
<body>
    <header>
        <h1>Tech Talks Day</h1>
        <p>A full day of technical insights and innovation.</p>
    </header>

    <main>
        <section class="schedule-section">
            <h2>Event Schedule</h2>
            <div class="search-bar">
                <input type="text" id="category-search" placeholder="Search by category (e.g., AI, Web Dev)">
                <button id="search-button">Search</button>
                <button id="reset-button">Reset</button>
            </div>
            <div id="schedule-list">
                <!-- Schedule items will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <div id="talk-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h3 id="modal-title"></h3>
            <p><strong id="modal-time"></strong></p>
            <p><strong id="modal-speakers"></strong></p>
            <p><strong id="modal-category"></strong></p>
            <p id="modal-description"></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Tech Talks Event</p>
    </footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const talksData = [
        {
            id: 'talk1',
            title: 'Introduction to WebAssembly',
            speakers: ['Alice Smith'],
            category: ['Web Development', 'Performance'],
            duration: 60,
            description: 'Dive into the basics of WebAssembly and discover how it\'s changing web performance and capabilities.'
        },
        {
            id: 'lunch',
            title: 'Lunch Break',
            speakers: [],
            category: [],
            duration: 60,
            isBreak: true
        },
        {
            id: 'talk2',
            title: 'Modern CSS Layouts with Grid and Flexbox',
            speakers: ['Bob Johnson'],
            category: ['Web Development', 'Frontend', 'CSS'],
            duration: 60,
            description: 'Master the art of responsive design using modern CSS Grid and Flexbox techniques.'
        },
        {
            id: 'talk3',
            title: 'Understanding Microservices Architecture',
            speakers: ['Charlie Brown', 'Dana White'],
            category: ['Backend', 'Architecture', 'Cloud'],
            duration: 60,
            description: 'Explore the benefits and challenges of designing and deploying microservices.'
        },
        {
            id: 'talk4',
            title: 'Data Science with Python and Pandas',
            speakers: ['Eve Davis'],
            category: ['Data Science', 'Python', 'Machine Learning'],
            duration: 60,
            description: 'An introductory guide to data manipulation and analysis using Python\'s Pandas library.'
        },
        {
            id: 'talk5',
            title: 'Securing Your Applications: Best Practices',
            speakers: ['Frank Green'],
            category: ['Security', 'DevOps'],
            duration: 60,
            description: 'Learn essential security practices to protect your web and mobile applications from common vulnerabilities.'
        },
        {
            id: 'talk6',
            title: 'The Future of AI in Software Development',
            speakers: ['Grace Black'],
            category: ['Artificial Intelligence', 'Future Tech'],
            duration: 60,
            description: 'A look into how AI is transforming the software development lifecycle and what to expect next.'
        }
    ];

    const scheduleList = document.getElementById('schedule-list');
    const categorySearchInput = document.getElementById('category-search');
    const searchButton = document.getElementById('search-button');
    const resetButton = document.getElementById('reset-button');
    const modal = document.getElementById('talk-modal');
    const closeButton = document.querySelector('.close-button');
    const modalTitle = document.getElementById('modal-title');
    const modalTime = document.getElementById('modal-time');
    const modalSpeakers = document.getElementById('modal-speakers');
    const modalCategory = document.getElementById('modal-category');
    const modalDescription = document.getElementById('modal-description');

    let currentSchedule = [];

    // Helper to format time
    function formatTime(date) {
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Generate schedule with timings
    function generateSchedule() {
        let currentTime = new Date();
        currentTime.setHours(10, 0, 0); // Start at 10:00 AM

        currentSchedule = talksData.map(item => {
            const startTime = new Date(currentTime);
            let endTime = new Date(startTime.getTime() + item.duration * 60 * 1000); // Add duration

            const scheduleItem = {
                ...item,
                startTime: formatTime(startTime),
                endTime: formatTime(endTime)
            };

            // Add transition time if it's not the last item
            if (item.id !== talksData[talksData.length - 1].id) {
                currentTime = new Date(endTime.getTime() + 10 * 60 * 1000); // Add 10 mins transition
            }
            return scheduleItem;
        });
    }

    // Render schedule items to the DOM
    function renderSchedule(filteredTalks = currentSchedule) {
        scheduleList.innerHTML = ''; // Clear previous entries

        if (filteredTalks.length === 0) {
            scheduleList.innerHTML = '<p>No talks found matching your search criteria.</p>';
            return;
        }

        filteredTalks.forEach(item => {
            const div = document.createElement('div');
            div.classList.add('schedule-item');
            if (item.isBreak) {
                div.classList.add('break');
                div.innerHTML = `
                    <h3>${item.title}</h3>
                    <p>${item.startTime} - ${item.endTime}</p>
                `;
            } else {
                div.setAttribute('data-id', item.id);
                div.innerHTML = `
                    <h3>${item.title}</h3>
                    <p><strong>Time:</strong> ${item.startTime} - ${item.endTime}</p>
                    <p><strong>Speakers:</strong> ${item.speakers.join(', ')}</p>
                    <p><strong>Category:</strong> ${item.category.join(', ')}</p>
                `;
                div.addEventListener('click', () => showTalkDetails(item));
            }
            scheduleList.appendChild(div);
        });
    }

    // Show talk details in a modal
    function showTalkDetails(talk) {
        modalTitle.textContent = talk.title;
        modalTime.textContent = `Time: ${talk.startTime} - ${talk.endTime}`;
        modalSpeakers.textContent = `Speakers: ${talk.speakers.join(', ')}`;
        modalCategory.textContent = `Category: ${talk.category.join(', ')}`;
        modalDescription.textContent = talk.description;
        modal.style.display = 'block';
    }

    // Close the modal
    closeButton.addEventListener('click', () => {
        modal.style.display = 'none';
    });

    window.addEventListener('click', (event) => {
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    });

    // Search functionality
    searchButton.addEventListener('click', () => {
        const searchTerm = categorySearchInput.value.toLowerCase().trim();
        if (searchTerm) {
            const filtered = currentSchedule.filter(item =>
                !item.isBreak && item.category.some(cat => cat.toLowerCase().includes(searchTerm))
            );
            renderSchedule(filtered);
        } else {
            renderSchedule(); // Render all if search term is empty
        }
    });

    // Reset search
    resetButton.addEventListener('click', () => {
        categorySearchInput.value = '';
        renderSchedule();
    });

    // Initial load
    generateSchedule();
    renderSchedule();
});
</script>
</body>
</html>
